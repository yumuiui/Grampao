<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{

  --gold:#C9A84C;--gold-h:#DFC06A;--gold-d:#8A7235;--gold-bg:rgba(201,168,76,0.07);

::-webkit-scrollbar-track{background:var(--black)}

const WA_MSG = encodeURIComponent('Olá! Gostaria de agendar um horário na Grampão Barber.');

const SERVICES=[

  {name:'Plano Mensal',desc:'Corte + barba ilimitados. A escolha de quem nunca para.',price:'R$ 89/mês',dur:'—'},

const TEAM=[
  {name:'Grampão',role:'Fundador & Master Barber',spec:'Fade · Degradê · Clássicos'},
  {name:'Barbeiro Sênior',role:'Sênior Barber',spec:'Barba · Navalha Artesanal'},
  {name:'Barbeiro',role:'Barber',spec:'Cortes Modernos · Textura'},
  {name:'Barbeiro',role:'Barber',spec:'Clássicos · Fades'},
];

/* ── hooks ── */
function useIsMobile(){
  const [m,setM]=useState(()=>window.innerWidth<768);
  useEffect(()=>{
    const h=()=>setM(window.innerWidth<768);
    window.addEventListener('resize',h,{passive:true});
    return()=>window.removeEventListener('resize',h);
  },[]);
  return m;
}
function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){el.classList.add('visible');obs.disconnect();}
    },{threshold:0.06});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return ref;
}

/* ── primitives ── */
function Eyebrow({children,style={}}){
  return <span style={{fontFamily:'var(--font-m)',fontSize:10,fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',color:'var(--gold)',display:'inline-flex',alignItems:'center',gap:8,...style}}>
    <span style={{display:'inline-block',width:20,height:1,background:'var(--gold)'}}/>
    {children}
  </span>;
}
function Placeholder({label,w='100%',h=400,style={}}){
  const id='p'+Math.random().toString(36).slice(2,7);
  return <div style={{width:w,height:h,background:'#110f0d',position:'relative',overflow:'hidden',flexShrink:0,...style}}>
    <svg width="100%" height="100%" style={{position:'absolute',inset:0,opacity:.05}}>
      <defs><pattern id={id} patternUnits="userSpaceOnUse" width="28" height="28" patternTransform="rotate(35)">
        <line x1="0" y1="0" x2="0" y2="28" stroke="#C9A84C" strokeWidth="1"/>
      </pattern></defs>
      <rect width="100%" height="100%" fill={`url(#${id})`}/>
    </svg>
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontFamily:'var(--font-m)',fontSize:9,color:'var(--ink-m)',letterSpacing:'1px',textTransform:'uppercase',textAlign:'center',padding:'0 16px'}}>{label}</span>
    </div>
  </div>;
}
function GoldBtn({children,onClick,href,small,style={}}){
  const [h,setH]=useState(false);
  const base={background:h?'var(--gold-h)':'var(--gold)',color:'var(--black)',fontFamily:'var(--font-m)',fontSize:small?10:11,fontWeight:500,letterSpacing:'2px',textTransform:'uppercase',padding:small?'11px 22px':'15px 40px',border:'none',cursor:'pointer',transition:'background .25s var(--ease)',display:'inline-flex',alignItems:'center',justifyContent:'center',minHeight:small?44:50,...style};
  if(href) return <a href={href} target="_blank" rel="noopener noreferrer" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={base}>{children}</a>;
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={base}>{children}</button>;
}
function GhostBtn({children,onClick,href,style={}}){
  const [h,setH]=useState(false);
  const base={background:'transparent',color:h?'var(--ink)':'var(--ink-b)',border:`1px solid ${h?'var(--gold)':'rgba(242,237,230,0.2)'}`,fontFamily:'var(--font-m)',fontSize:11,fontWeight:500,letterSpacing:'2px',textTransform:'uppercase',padding:'14px 36px',cursor:'pointer',transition:'all .25s var(--ease)',display:'inline-flex',alignItems:'center',justifyContent:'center',minHeight:50,...style};
  if(href) return <a href={href} target="_blank" rel="noopener noreferrer" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={base}>{children}</a>;
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={base}>{children}</button>;
}

/* ══ NAV ══ */
function Nav({onBook}){
  const isMobile=useIsMobile();
  const [scrolled,setScrolled]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>60);
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[]);
  useEffect(()=>{if(!isMobile)setOpen(false);},[isMobile]);
  const links=[['Serviços','#servicos'],['História','#historia'],['Galeria','#galeria'],['Contato','#contato']];
  return <>
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:200,height:64,display:'flex',alignItems:'center',padding:isMobile?'0 20px':'0 48px',background:scrolled||open?'rgba(10,9,7,0.97)':'transparent',backdropFilter:scrolled||open?'blur(16px)':'none',borderBottom:scrolled||open?'1px solid var(--hair)':'1px solid transparent',transition:'background .4s var(--ease),border-color .4s var(--ease)'}}>
      <div style={{flex:1,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'var(--font-d)',fontSize:isMobile?14:15,fontWeight:500,letterSpacing:'.5px',color:'var(--ink)'}}>Grampão Barber</span>
      </div>
      {isMobile
        ? <button onClick={()=>setOpen(o=>!o)} aria-label="Menu" style={{display:'flex',flexDirection:'column',gap:5,alignItems:'center',justifyContent:'center',width:44,height:44,padding:'10px 8px'}}>
            {[open?'rotate(45deg) translate(4px,4px)':'none','none',open?'rotate(-45deg) translate(4px,-4px)':'none'].map((tr,i)=>(
              <span key={i} style={{display:'block',width:22,height:1.5,background:open?'var(--gold)':'var(--ink)',transition:'all .3s var(--ease)',transform:tr,opacity:i===1&&open?0:1}}/>
            ))}
          </button>
        : <div style={{display:'flex',gap:40,alignItems:'center'}}>
            {links.map(([l,h])=>(
              <a key={l} href={h} style={{fontFamily:'var(--font-m)',fontSize:10,fontWeight:500,letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--ink-b)',transition:'color .2s'}}
                onMouseEnter={e=>e.target.style.color='var(--ink)'} onMouseLeave={e=>e.target.style.color='var(--ink-b)'}>{l}</a>
            ))}
            <GoldBtn onClick={onBook} small>Agendar</GoldBtn>
          </div>
      }
    </nav>
    {isMobile&&<div style={{position:'fixed',top:64,left:0,right:0,zIndex:199,background:'rgba(10,9,7,0.97)',backdropFilter:'blur(16px)',borderBottom:'1px solid var(--hair)',transform:open?'translateY(0)':'translateY(-110%)',transition:'transform .35s var(--ease)',pointerEvents:open?'auto':'none'}}>
      {links.map(([l,h])=>(
        <a key={l} href={h} onClick={()=>setOpen(false)} style={{display:'flex',alignItems:'center',fontFamily:'var(--font-m)',fontSize:11,fontWeight:500,letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--ink-b)',padding:'0 20px',height:56,borderBottom:'1px solid var(--hair)'}}>{l}</a>
      ))}
      <div style={{padding:'20px'}}>
        <GoldBtn onClick={()=>{setOpen(false);onBook();}} style={{width:'100%',justifyContent:'center'}}>Agendar Agora</GoldBtn>
      </div>
    </div>}
  </>;
}

/* ══ HERO ══ */
function Hero({onBook}){

      <span style={{fontFamily:'var(--font-m)',fontSize:8,color:'var(--ink-m)',letterSpacing:'2px',writingMode:'vertical-rl',textTransform:'uppercase'}}>Scroll</span>

/* ══ STATS ══ */

    style={{background:hov?'var(--s2)':'var(--s1)',border:`1px solid ${hov?'var(--gold-d)':'var(--hair)'}`,padding:'28px 24px',cursor:'pointer',transition:'background .3s var(--ease),border-color .3s var(--ease)',display:'flex',flexDirection:'column',gap:16,minHeight:180}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>

      Agendar <span style={{fontSize:13}}>→</span>

function Services({onBook}){

/* ══ HISTÓRIA ══ */
function HistoriaCard({s,idx}){
  const ref=useReveal();

    <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',lineHeight:1.8,flex:1}}>{s.text}</p>
  </div>;
}
function Historia(){
  const isMobile=useIsMobile();
  const ref=useReveal();
  const ref2=useReveal();
  const ref3=useReveal();
  const stories=[
    {tag:'O apelido',title:'Como nasceu o Grampão',icon:'💬',text:'Tinha uns 18 pra 19 anos, trabalhando na Cristal Grafite. Um colega — gente boa, mas com dificuldade na fala — tentou soltar um "grandão" ao ver aquele poste humano passando. O que saiu foi um sonoro "GRAMPÃO!". Na hora rolou a risada, mas o apelido grudou igual cola industrial. Mais de 20 anos depois, tem gente que nem sabe o nome de batismo — só conhece o Grampão.'},
    {tag:'A origem',title:'Do quintal ao negócio',icon:'✂️',text:'O desemprego bateu na porta — e em vez de desanimar, ele decidiu agir. Se matriculou no curso de barbeiro da Faculdade Simonsen, em Padre Miguel. Dois meses de curso foram suficientes pra acender a ideia que mudaria tudo. Começou do jeito raiz, no quintal da casa dos pais, sem luxo, só com dedicação e foco. Cada corte era uma oportunidade. Cada cliente era tratado como único. E assim o nome Grampão foi virando marca.'},

const TIME_SLOTS=['09:00','09:45','10:30','11:15','14:00','14:45','15:30','16:15','17:00','17:45'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function BookingModal({onClose,initService}){
  const isMobile=useIsMobile();
  const [step,setStep]=useState(1);
  const [sel,setSel]=useState({service:initService||null,barber:null,date:null,time:null});
  const [form,setForm]=useState({name:'',phone:''});
  const [done,setDone]=useState(false);
  const today=new Date();
  const dates=Array.from({length:14},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()+i+1);return d;});
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    document.body.style.overflow='hidden';
    return()=>{window.removeEventListener('keydown',h);document.body.style.overflow='';};
  },[onClose]);
  const canNext=()=>{
    if(step===1)return!!sel.service;
    if(step===2)return!!sel.barber;
    if(step===3)return!!sel.date&&!!sel.time;
    if(step===4)return form.name.length>2&&form.phone.length>8;
    return false;
  };
  const buildWA=()=>{
    const d=sel.date?`${sel.date.getDate()}/${sel.date.getMonth()+1}`:'';
    const msg=`Olá! Quero confirmar:\n\n*Serviço:* ${sel.service?.name}\n*Profissional:* ${sel.barber?.name}\n*Data:* ${d} às ${sel.time}\n*Nome:* ${form.name}\n*Tel:* ${form.phone}`;
    return `https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
  };
  const STEPS=['Serviço','Profissional','Horário','Seus dados'];
  return <div onClick={e=>e.target===e.currentTarget&&onClose()}
    style={{position:'fixed',inset:0,zIndex:400,background:'rgba(10,9,7,.92)',backdropFilter:'blur(12px)',display:'flex',alignItems:isMobile?'flex-end':'center',justifyContent:'center',padding:isMobile?0:24}}>
    <div style={{background:'var(--s2)',border:'1px solid var(--hair2)',width:'100%',maxWidth:560,height:isMobile?'92%':'auto',maxHeight:isMobile?'92%':'90vh',overflowY:'auto',borderRadius:isMobile?'12px 12px 0 0':0,position:'relative'}}>
      <div style={{padding:isMobile?'20px 20px 0':'28px 36px 0',borderBottom:'1px solid var(--hair)',paddingBottom:20,position:'sticky',top:0,background:'var(--s2)',zIndex:1}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div><Eyebrow>Grampão Barber</Eyebrow><h2 style={{fontFamily:'var(--font-d)',fontSize:24,fontWeight:500,color:'var(--ink)',marginTop:8,letterSpacing:'-.3px'}}>Agendamento</h2></div>
          <button onClick={onClose} aria-label="Fechar" style={{color:'var(--ink-m)',width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>×</button>
        </div>
        {!done&&<div style={{display:'flex',gap:2}}>
          {STEPS.map((s,i)=>(
            <div key={s} style={{flex:1}}>
              <div style={{height:2,background:i+1<=step?'var(--gold)':'var(--hair)',marginBottom:6,transition:'background .4s var(--ease)'}}/>
              <span style={{fontFamily:'var(--font-m)',fontSize:isMobile?7:8,letterSpacing:'1px',textTransform:'uppercase',color:i+1<=step?'var(--gold)':'var(--ink-g)'}}>{s}</span>
            </div>
          ))}
        </div>}
      </div>
      <div style={{padding:isMobile?'20px 20px 32px':'28px 36px 32px'}}>
        {done
          ? <BookingDone sel={sel} form={form} waUrl={buildWA()} onClose={onClose}/>
          : <>
            {step===1&&<Step1 sel={sel} setSel={setSel}/>}
            {step===2&&<Step2 sel={sel} setSel={setSel}/>}
            {step===3&&<Step3 sel={sel} setSel={setSel} dates={dates}/>}
            {step===4&&<Step4 sel={sel} form={form} setForm={setForm}/>}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:28,paddingTop:20,borderTop:'1px solid var(--hair)',gap:12}}>
              <button onClick={()=>step>1?setStep(s=>s-1):onClose()} style={{fontFamily:'var(--font-m)',fontSize:9,letterSpacing:'2px',textTransform:'uppercase',color:'var(--ink-m)',padding:'12px 0',minHeight:44}}>
                {step>1?'← Voltar':'Cancelar'}
              </button>
              <GoldBtn onClick={()=>step<4?setStep(s=>s+1):setDone(true)} style={{opacity:canNext()?1:.35,cursor:canNext()?'pointer':'not-allowed',padding:'13px 28px'}}>
                {step<4?'Próximo →':'Confirmar'}
              </GoldBtn>
            </div>
          </>
        }
      </div>
    </div>
  </div>;
}
function Step1({sel,setSel}){
  return <div>
    <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',marginBottom:12}}>Escolha o serviço:</p>
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      {SERVICES.map(s=>{
        const act=sel.service?.name===s.name;
        return <div key={s.name} onClick={()=>setSel(p=>({...p,service:s}))} style={{padding:'13px 16px',background:act?'var(--s3)':'var(--s1)',border:`1px solid ${act?'var(--gold)':'var(--hair)'}`,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all .2s var(--ease)',gap:12,minHeight:54}}>
          <div>
            <span style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:act?500:300,color:'var(--ink)',display:'block',marginBottom:2}}>{s.name}</span>
            <span style={{fontFamily:'var(--font-m)',fontSize:8,color:'var(--ink-m)',letterSpacing:'1.5px'}}>{s.dur}</span>
          </div>
          <span style={{fontFamily:'var(--font-d)',fontSize:17,color:'var(--gold)',flexShrink:0}}>{s.price}</span>
        </div>;
      })}
    </div>
  </div>;
}
function Step2({sel,setSel}){
  const isMobile=useIsMobile();
  const all=[...TEAM,{name:'Sem preferência',role:'Primeiro disponível',spec:''}];
  return <div>
    <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',marginBottom:12}}>Escolha o profissional:</p>
    <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:2}}>
      {all.map(b=>{
        const act=sel.barber?.name===b.name;
        return <div key={b.name} onClick={()=>setSel(p=>({...p,barber:b}))} style={{padding:'16px',background:act?'var(--s3)':'var(--s1)',border:`1px solid ${act?'var(--gold)':'var(--hair)'}`,cursor:'pointer',transition:'all .2s var(--ease)',minHeight:60}}>
          <span style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:500,color:'var(--ink)',display:'block',marginBottom:4}}>{b.name}</span>
          <span style={{fontFamily:'var(--font-m)',fontSize:8,letterSpacing:'1.5px',textTransform:'uppercase',color:act?'var(--gold)':'var(--ink-m)'}}>{b.role}</span>
        </div>;
      })}
    </div>
  </div>;
}
function Step3({sel,setSel,dates}){
  const isMobile=useIsMobile();
  return <div>
    <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',marginBottom:12}}>Selecione a data:</p>
    <div style={{display:'grid',gridTemplateColumns:`repeat(${isMobile?5:7},1fr)`,gap:2,marginBottom:24}}>
      {dates.slice(0,isMobile?10:14).map((d,i)=>{
        const act=sel.date?.toDateString()===d.toDateString();
        return <div key={i} onClick={()=>setSel(p=>({...p,date:d,time:null}))} style={{padding:'8px 2px',textAlign:'center',cursor:'pointer',background:act?'var(--gold)':'var(--s1)',border:`1px solid ${act?'var(--gold)':'var(--hair)'}`,transition:'all .2s var(--ease)',minHeight:52,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontFamily:'var(--font-m)',fontSize:7,color:act?'var(--black)':'var(--ink-m)',textTransform:'uppercase'}}>{DAYS[d.getDay()]}</div>
          <div style={{fontFamily:'var(--font-s)',fontSize:13,fontWeight:500,color:act?'var(--black)':'var(--ink)',marginTop:2}}>{d.getDate()}</div>
          <div style={{fontFamily:'var(--font-m)',fontSize:7,color:act?'var(--black)':'var(--ink-g)',marginTop:1}}>{MONTHS[d.getMonth()]}</div>
        </div>;
      })}
    </div>
    {sel.date&&<>
      <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',marginBottom:12}}>Horário disponível:</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:2}}>
        {TIME_SLOTS.map(t=>{
          const act=sel.time===t;
          return <div key={t} onClick={()=>setSel(p=>({...p,time:t}))} style={{padding:'12px 4px',textAlign:'center',cursor:'pointer',background:act?'var(--gold)':'var(--s1)',border:`1px solid ${act?'var(--gold)':'var(--hair)'}`,fontFamily:'var(--font-m)',fontSize:11,fontWeight:500,color:act?'var(--black)':'var(--ink)',transition:'all .2s var(--ease)',minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>{t}</div>;
        })}
      </div>
    </>}
  </div>;
}
function Step4({sel,form,setForm}){
  const d=sel.date?`${DAYS[sel.date.getDay()]}, ${sel.date.getDate()}/${sel.date.getMonth()+1}`:'—';
  return <div>
    <div style={{background:'var(--s1)',border:'1px solid var(--hair)',padding:'16px 18px',marginBottom:20}}>
      <div style={{fontFamily:'var(--font-m)',fontSize:9,letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginBottom:10}}>Resumo</div>
      {[['Serviço',sel.service?.name],['Profissional',sel.barber?.name],['Data',d],['Horário',sel.time],['Valor',sel.service?.price]].map(([k,v])=>(
        <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--hair)',gap:8}}>
          <span style={{fontFamily:'var(--font-m)',fontSize:9,letterSpacing:'1px',textTransform:'uppercase',color:'var(--ink-m)'}}>{k}</span>
          <span style={{fontFamily:'var(--font-s)',fontSize:13,color:'var(--ink)',textAlign:'right'}}>{v}</span>
        </div>
      ))}
    </div>
    <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',marginBottom:16}}>Preencha seus dados:</p>
    {[{l:'Nome completo',k:'name',t:'text',ph:'Seu nome'},{l:'Telefone / WhatsApp',k:'phone',t:'tel',ph:'(21) 9 0000-0000'}].map(f=>(
      <div key={f.k} style={{marginBottom:16}}>
        <label style={{fontFamily:'var(--font-m)',fontSize:9,letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',display:'block',marginBottom:8}}>{f.l}</label>
        <input type={f.t} placeholder={f.ph} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}
          style={{width:'100%',background:'var(--s1)',border:'1px solid var(--hair)',color:'var(--ink)',padding:'14px 16px',fontSize:16,fontFamily:'var(--font-s)',fontWeight:300,outline:'none',WebkitAppearance:'none'}}
          onFocus={e=>e.target.style.borderColor='var(--gold)'} onBlur={e=>e.target.style.borderColor='var(--hair)'}/>
      </div>
    ))}
  </div>;
}
function BookingDone({sel,form,waUrl,onClose}){
  const d=sel.date?`${sel.date.getDate()}/${sel.date.getMonth()+1}`:'';
  return <div style={{textAlign:'center',padding:'8px 0'}}>
    <div style={{width:56,height:56,border:'1px solid var(--gold)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
      <span style={{color:'var(--gold)',fontSize:24}}>✓</span>
    </div>
    <h3 style={{fontFamily:'var(--font-d)',fontSize:26,fontWeight:500,color:'var(--ink)',marginBottom:8,letterSpacing:'-.3px'}}>Agendado!</h3>
    <p style={{fontFamily:'var(--font-s)',fontSize:14,fontWeight:300,color:'var(--ink-b)',marginBottom:24,lineHeight:1.7}}>
      Obrigado, <strong style={{color:'var(--ink)',fontWeight:500}}>{form.name}</strong>. Seu horário está reservado.
    </p>
    <div style={{background:'var(--s1)',border:'1px solid var(--hair)',padding:'16px 18px',marginBottom:24,textAlign:'left'}}>
      {[['Serviço',sel.service?.name],['Profissional',sel.barber?.name],['Data & Hora',`${d} às ${sel.time}`],['Valor',sel.service?.price]].map(([k,v])=>(
        <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--hair)',gap:8}}>
          <span style={{fontFamily:'var(--font-m)',fontSize:9,letterSpacing:'1px',textTransform:'uppercase',color:'var(--ink-m)'}}>{k}</span>
          <span style={{fontFamily:'var(--font-s)',fontSize:13,color:'var(--ink)',textAlign:'right'}}>{v}</span>
        </div>
      ))}
    </div>
    <a href={waUrl} target="_blank" rel="noopener noreferrer" style={{display:'block',marginBottom:14}}>
      <GoldBtn style={{width:'100%',justifyContent:'center'}}>Confirmar via WhatsApp →</GoldBtn>
    </a>
    <button onClick={onClose} style={{fontFamily:'var(--font-m)',fontSize:9,letterSpacing:'2px',textTransform:'uppercase',color:'var(--ink-m)',padding:'10px 0',minHeight:40}}>Fechar</button>
  </div>;
}

/* ══ APP ══ */
function App(){
  const [bookOpen,setBookOpen]=useState(false);
  const [bookSvc,setBookSvc]=useState(null);
  const openBook=useCallback((svc=null)=>{setBookSvc(svc);setBookOpen(true);},[]);
  const closeBook=useCallback(()=>{setBookOpen(false);setBookSvc(null);},[]);
  return <>
    <Nav onBook={()=>openBook()}/>
    <Hero onBook={()=>openBook()}/>
    <StatsBand/>
    <Services onBook={openBook}/>
    <GoldBand/>
    <Historia/>
    <Gallery/>
    <Team/>
    <Location/>
    <Footer/>
    <WAFloat/>
    {bookOpen&&<BookingModal onClose={closeBook} initService={bookSvc}/>}
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
